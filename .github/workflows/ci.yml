name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npx prisma generate && npx next build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/snaplink
          REDIS_URL: redis://localhost:6379
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          AUTH_SECRET: ci-secret-for-build-only
          AUTH_GOOGLE_ID: placeholder
          AUTH_GOOGLE_SECRET: placeholder
